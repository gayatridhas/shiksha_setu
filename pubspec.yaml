name: shiksha_setu_2
description: ShikshaSetu - A rural school management and monitoring app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.4
  go_router: ^12.1.1
  intl: any
  fl_chart: ^0.65.0
  collection: ^1.18.0
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  
  # Utils
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  http: ^1.1.0
  pdf: ^3.11.0
  printing: ^5.13.4
  share_plus: ^10.0.2
  excel: ^4.0.6
  cross_file: ^0.3.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  generate: true
  uses-material-design: true
